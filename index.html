<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lamecie Bakery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #e6f7ff;
}

header {
    background: #8fd3ff;
    color: white;
    text-align: center;
    padding: 25px;
}

h1 { margin: 0; }

.menu {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
    padding: 15px;
}

.card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.card-content {
    padding: 10px;
}

button {
    background: #8fd3ff;
    border: none;
    padding: 8px;
    width: 100%;
    cursor: pointer;
    color: white;
    font-weight: bold;
}

#cart {
    position: fixed;
    right: 10px;
    top: 10px;
    background: white;
    padding: 10px;
    border-radius: 10px;
    width: 200px;
}

#success {
    display: none;
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #4CAF50;
    color: white;
    padding: 15px;
    border-radius: 10px;
}
</style>
</head>

<body>

<header>
    <h1>Lamecie Bakery 💙</h1>
    <p>Order your desserts online</p>
</header>

<div id="cart">
    <h3>Cart</h3>
    <div id="cartItems"></div>
    <button onclick="sendOrder()">Checkout</button>
</div>

<div class="menu" id="menu"></div>

<div id="success">Order placed successfully 🎉</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

// 🔥 TU CONFIG FIREBASE (REEMPLAZA ESTO)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// MENU
const products = [
  { name: "Classic Cheesecake", price: 25 },
  { name: "Chocolate Cheesecake", price: 25 },
  { name: "Oreo Cheesecake", price: 25 },
  { name: "Red Berries Cheesecake", price: 25 },
  { name: "Pistachio Cheesecake", price: 25 },
  { name: "Passion Fruit Cheesecake", price: 25 },
  { name: "Tiramisu", price: 30 },
  { name: "Custom Cake", price: 80 }
];

let cart = [];

const menu = document.getElementById("menu");
const cartItems = document.getElementById("cartItems");

// render menu
products.forEach((p, i) => {
    menu.innerHTML += `
    <div class="card">
        <img src="https://source.unsplash.com/400x300/?cake,dessert,${i}" />
        <div class="card-content">
            <h3>${p.name}</h3>
            <p>Bs ${p.price}</p>
            <button onclick="addToCart(${i})">Add</button>
        </div>
    </div>`;
});

window.addToCart = (i) => {
    cart.push(products[i]);
    renderCart();
};

function renderCart() {
    cartItems.innerHTML = "";
    cart.forEach((c, i) => {
        cartItems.innerHTML += `<p>${c.name} - Bs ${c.price}</p>`;
    });
}

window.sendOrder = async () => {
    if(cart.length === 0) return;

    await addDoc(collection(db, "orders"), {
        items: cart,
        date: new Date().toString()
    });

    cart = [];
    renderCart();

    document.getElementById("success").style.display = "block";
    setTimeout(() => {
        document.getElementById("success").style.display = "none";
    }, 3000);
};
</script>

</body>
</html>
